<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="logo" href="/">{{ site_name }}</a>
    <nav class="boardnav">
      {% block nav %}{% endblock %}
    </nav>
  </header>

  <main class="container">
    <!-- News / Ads Space -->
    <div class="news-banner">
      <div class="banner-title">News & Announcements</div>
      <div class="banner-content">
        <img src="https://raw.githubusercontent.com/its-Sohan/banchan/refs/heads/main/resources/mr-twist-mr-twist-chips.gif" alt="Banner GIF" style="max-height: 180px; width: auto; border-radius: 4px;">
      </div>
    </div>

    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <small>{{ site_name }} &middot; experimental board software</small>
  </footer>
</body>
</html>
